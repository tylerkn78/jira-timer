# Jira Timer - nginx reverse proxy config
# Place at /etc/nginx/sites-available/jira-timer and symlink into sites-enabled.
#
# Generate a self-signed cert for internal use:
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 825 -newkey rsa:2048 \
#       -keyout /etc/nginx/ssl/jira-timer.key \
#       -out /etc/nginx/ssl/jira-timer.crt \
#       -subj "/CN=jira-timer.internal"
#   sudo chmod 600 /etc/nginx/ssl/jira-timer.key

# limit_req_zone must live in the http block, not inside a server block.
# nginx includes sites-available files inside the http block in nginx.conf,
# so a top-level declaration here is valid.
limit_req_zone $binary_remote_addr zone=jira_login:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/jira-timer.crt;
    ssl_certificate_key /etc/nginx/ssl/jira-timer.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    location /api/login {
        limit_req zone=jira_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
