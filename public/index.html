<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jira Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-900: #0747a6;
    --blue-700: #0052cc;
    --blue-500: #0065ff;
    --blue-400: #2684ff;
    --blue-200: #4c9aff;
    --surface: #0a1628;
    --surface-2: #0d1f3c;
    --surface-3: #122347;
    --surface-4: #1a3160;
    --text-primary: #ffffff;
    --text-secondary: #a8c4e8;
    --text-muted: #5e7fa8;
    --green: #36b37e;
    --green-dim: #1e3d2f;
    --red: #ff5630;
    --red-dim: #3d1a10;
    --yellow: #ffab00;
    --purple: #6554c0;
    --purple-dim: #1e1a3d;
    --border: rgba(74, 144, 226, 0.18);
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(0,82,204,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(38,132,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===================== LOGIN ===================== */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--surface);
    padding: 20px;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 30% 40%, rgba(0,82,204,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(38,132,255,0.18) 0%, transparent 70%);
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 380px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    animation: slideUp 0.35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    justify-content: center;
  }

  .login-logo svg { width: 34px; height: 34px; }

  .login-logo span {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.4px;
  }

  .login-subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-bottom: 28px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }

  .form-group input {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  .form-group input:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(38,132,255,0.15);
  }

  .login-error {
    color: var(--red);
    font-size: 0.8rem;
    text-align: center;
    margin-top: 8px;
    min-height: 18px;
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--blue-500);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(0,101,255,0.3);
  }

  .btn-primary:active { transform: scale(0.98); background: var(--blue-400); }

  /* ===================== PASSWORD CHANGE ===================== */
  #password-change-screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 110;
    background: var(--surface);
    padding: 20px;
  }
  #password-change-screen.visible { display: flex; }

  #password-change-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 30% 40%, rgba(0,82,204,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(38,132,255,0.18) 0%, transparent 70%);
  }

  .pwd-intro {
    color: var(--text-secondary);
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .pwd-intro.required {
    color: var(--yellow);
  }

  .btn-secondary-nav {
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .btn-secondary-nav:hover { border-color: var(--blue-400); color: var(--blue-400); }

  /* ===================== APP ===================== */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }

  /* ---- NAVBAR ---- */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 22, 40, 0.94);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-primary);
    text-decoration: none;
    flex-shrink: 0;
  }

  .nav-brand svg { width: 24px; height: 24px; flex-shrink: 0; }
  .nav-brand-text { display: none; }
  .nav-brand-sub { display: none; }

  .nav-tabs { display: flex; gap: 4px; }

  .nav-tab {
    padding: 7px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Sora', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .nav-tab:hover { background: var(--surface-3); }
  .nav-tab.active { background: var(--blue-700); color: white; }
  .nav-tab.admin-tab { color: var(--purple); }
  .nav-tab.admin-tab:hover { background: var(--purple-dim); }
  .nav-tab.admin-tab.active { background: var(--purple); color: white; }

  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .nav-user { display: none; font-size: 0.73rem; color: var(--text-muted); }

  .btn-logout {
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .btn-logout-text { display: none; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ---- PAGES ---- */
  .page { display: none; padding: 20px 14px 40px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; animation: fadeIn 0.22s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .page-title span {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    color: var(--text-muted);
    padding: 4px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    white-space: nowrap;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ---- STATS ---- */
  .stat-bar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .stat-chip .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-chip .lbl {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  /* ---- TICKET INPUT ---- */
  .ticket-input-zone {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }

  .ticket-input {
    flex: 1;
    min-width: 0;
    padding: 13px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
    appearance: none;
  }

  .ticket-input::placeholder {
    color: var(--text-muted);
    text-transform: none;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
  }

  .ticket-input:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(38,132,255,0.12);
  }

  .btn-add {
    padding: 13px 18px;
    background: var(--blue-500);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(0,101,255,0.25);
    transition: background 0.18s, transform 0.1s;
  }

  .btn-add:active { background: var(--blue-400); transform: scale(0.97); }

  .input-error {
    color: var(--red);
    font-size: 0.76rem;
    margin-bottom: 12px;
    min-height: 16px;
  }

  /* ---- TICKET SECTION HEADERS ---- */
  .ticket-section { margin-bottom: 8px; }

  .ticket-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px 8px;
    margin-bottom: 6px;
  }

  .ticket-section-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }

  .ticket-section-label.label-running { color: var(--green); }
  .ticket-section-label.label-paused { color: var(--yellow); }
  .ticket-section-label.label-done { color: var(--text-muted); }

  .ticket-section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .ticket-section-count {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---- TICKET CARD - MOBILE FIRST ---- */
  .tickets-list { display: flex; flex-direction: column; gap: 10px; }

  .ticket-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.2s;
    animation: cardIn 0.28s ease;
    position: relative;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ticket-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--blue-400);
    transition: background 0.2s;
  }

  .ticket-card.running::before { background: var(--green); }
  .ticket-card.completed::before { background: var(--text-muted); }

  .card-top {
    padding: 14px 16px 12px 20px;
  }

  .card-top-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }

  .ticket-info { min-width: 0; }

  .ticket-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--blue-200);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ticket-status {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-top: 2px;
  }

  .status-running { color: var(--green); }
  .status-paused { color: var(--yellow); }
  .status-completed { color: var(--text-muted); }

  .ticket-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.75rem;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-top: 6px;
    display: block;
  }

  .ticket-timer.running { color: var(--green); }

  .card-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .card-btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Sora', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }

  .card-btn + .card-btn { border-left: 1px solid var(--border); }
  .card-btn svg { flex-shrink: 0; }
  .card-btn.play { color: var(--green); }
  .card-btn.play:active { background: var(--green-dim); }
  .card-btn.stop { color: var(--yellow); }
  .card-btn.stop:active { background: rgba(80,60,0,0.4); }
  .card-btn.complete { color: var(--blue-200); }
  .card-btn.complete:active { background: var(--surface-4); }
  .card-btn.delete { color: var(--red); }
  .card-btn.delete:active { background: var(--red-dim); }

  .card-done-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px 20px;
    border-top: 1px solid var(--border);
    gap: 10px;
  }

  .done-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .done-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .btn-remove {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .btn-remove:active { background: var(--red-dim); color: var(--red); border-color: transparent; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-muted);
  }

  .empty-state svg { width: 42px; height: 42px; opacity: 0.22; margin-bottom: 14px; }
  .empty-state p { font-size: 0.88rem; margin-bottom: 6px; }
  .empty-state small { font-size: 0.75rem; }

  /* ---- HISTORY ---- */
  .history-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 18px;
  }

  .filter-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .sort-select {
    padding: 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 0.83rem;
    outline: none;
    cursor: pointer;
    appearance: none;
  }

  .history-group { margin-bottom: 22px; }

  .history-group-header {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 0 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-group-total {
    font-family: 'JetBrains Mono', monospace;
    color: var(--blue-200);
    font-size: 0.76rem;
  }

  .history-row {
    display: flex;
    align-items: center;
    padding: 11px 12px;
    border-radius: 8px;
    gap: 10px;
    transition: background 0.14s;
    animation: cardIn 0.25s ease;
  }

  .history-row:hover { background: var(--surface-2); }

  .history-ticket-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--blue-200);
    flex: 1;
    letter-spacing: 0.04em;
  }

  .history-completed-at {
    font-size: 0.72rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .history-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text-secondary);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  .btn-del-history {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }

  .btn-del-history:hover { background: var(--red-dim); color: var(--red); border-color: transparent; }
  .btn-del-history:active { background: var(--red-dim); color: var(--red); }

  /* ===================== ADMIN PAGE ===================== */

  .admin-section {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    overflow: hidden;
  }

  .admin-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-3);
  }

  .admin-section-title {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
  }

  .admin-section-title.purple { color: var(--purple); }

  .admin-section-body { padding: 20px; }

  /* Add user form */
  .add-user-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .add-user-form .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 130px;
  }

  .add-user-form label {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .add-user-form input {
    padding: 10px 12px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  .add-user-form input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(101,84,192,0.15);
  }

  .btn-create-user {
    padding: 10px 18px;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;

<script>
let tickets = [];
let isAdmin = false;
let pollInterval = null;
let localTickInterval = null;
let serverSyncInterval = null;
let timerOffsets = {};

// ---- CSRF-aware fetch wrapper ----
// Transparently attaches the X-CSRF-Token header to all non-GET API calls.
// On CSRF failure, fetches a fresh token and retries once.
let _csrfToken = null;
const _origFetch = window.fetch.bind(window);

async function _fetchCsrfToken() {
  const res = await _origFetch('/api/csrf', { credentials: 'same-origin' });
  if (!res.ok) throw new Error('Could not fetch CSRF token');
  const data = await res.json();
  _csrfToken = data.csrfToken;
  return _csrfToken;
}

async function _ensureCsrfToken() {
  if (_csrfToken) return _csrfToken;
  return _fetchCsrfToken();
}

window.fetch = async function(url, options = {}) {
  const method = (options.method || 'GET').toUpperCase();
  const needsCsrf = method !== 'GET' && method !== 'HEAD' && typeof url === 'string' && url.startsWith('/api/');
  options.credentials = options.credentials || 'same-origin';
  if (needsCsrf) {
    options.headers = Object.assign({}, options.headers || {}, {
      'X-CSRF-Token': await _ensureCsrfToken()
    });
  }
  let res = await _origFetch(url, options);
  if (needsCsrf && res.status === 403) {
    // Possibly a stale token — try once more with a fresh one.
    let body = null;
    try { body = await res.clone().json(); } catch (_) {}
    if (body && /csrf/i.test(body.error || '')) {
      _csrfToken = null;
      options.headers['X-CSRF-Token'] = await _ensureCsrfToken();
      res = await _origFetch(url, options);
    }
  }
  return res;
};

// ---- AUTH ----
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    isAdmin = !!data.isAdmin;
    _csrfToken = null; // force fresh token tied to the new session id
    if (data.mustChangePassword) {
      showPasswordChangeRequired(data.username);
    } else {
      await enterApp(data.username);
    }
  } catch (e) {
    document.getElementById('login-error').textContent = e.message || 'Login failed';
  } finally {
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}

async function enterApp(username) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('password-change-screen').classList.remove('visible');
  document.getElementById('app').style.display = 'block';
  document.getElementById('nav-username').textContent = username;
  if (isAdmin) document.getElementById('admin-nav-tab').style.display = '';
  await loadTickets();
  startPolling();
}

// ---- PASSWORD CHANGE ----
let _pwdChangeRequired = false;

function showPasswordChangeRequired(username) {
  _pwdChangeRequired = true;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  const intro = document.getElementById('pwd-intro');
  intro.classList.add('required');
  intro.textContent = `Hi ${username}. Your password must be changed before continuing. Minimum 12 characters.`;
  document.getElementById('pwd-cancel-btn').style.display = 'none';
  document.getElementById('pwd-current').value = '';
  document.getElementById('pwd-new').value = '';
  document.getElementById('pwd-confirm').value = '';
  document.getElementById('pwd-error').textContent = '';
  document.getElementById('password-change-screen').classList.add('visible');
  setTimeout(() => document.getElementById('pwd-current').focus(), 50);
}

function openChangePassword() {
  _pwdChangeRequired = false;
  const intro = document.getElementById('pwd-intro');
  intro.classList.remove('required');
  intro.textContent = 'Set a new password for your account. Minimum 12 characters.';
  document.getElementById('pwd-cancel-btn').style.display = '';
  document.getElementById('pwd-current').value = '';
  document.getElementById('pwd-new').value = '';
  document.getElementById('pwd-confirm').value = '';
  document.getElementById('pwd-error').textContent = '';
  document.getElementById('password-change-screen').classList.add('visible');
  setTimeout(() => document.getElementById('pwd-current').focus(), 50);
}

function cancelChangePassword() {
  if (_pwdChangeRequired) return; // can't cancel a required change
  document.getElementById('password-change-screen').classList.remove('visible');
}

async function doChangePassword() {
  const currentPassword = document.getElementById('pwd-current').value;
  const newPassword = document.getElementById('pwd-new').value;
  const confirm = document.getElementById('pwd-confirm').value;
  const err = document.getElementById('pwd-error');
  err.textContent = '';
  if (!currentPassword || !newPassword) { err.textContent = 'All fields are required.'; return; }
  if (newPassword.length < 12) { err.textContent = 'New password must be at least 12 characters.'; return; }
  if (newPassword !== confirm) { err.textContent = 'New passwords do not match.'; return; }
  const btn = document.getElementById('pwd-btn');
  btn.textContent = 'Updating...'; btn.disabled = true;
  try {
    const res = await fetch('/api/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not update password');
    document.getElementById('password-change-screen').classList.remove('visible');
    toast('Password updated', 'success');
    if (_pwdChangeRequired) {
      // Continue into the app now that the required change is done.
      const me = await (await fetch('/api/me')).json();
      isAdmin = !!me.isAdmin;
      await enterApp(me.user);
    }
    _pwdChangeRequired = false;
  } catch (e) {
    err.textContent = e.message || 'Could not update password';
  } finally {
    btn.textContent = 'Update Password'; btn.disabled = false;
  }
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  stopPolling();
  await fetch('/api/logout', { method: 'POST' });
  tickets = [];
  isAdmin = false;
  _csrfToken = null;
  _pwdChangeRequired = false;

async function checkAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (data.user) {
      isAdmin = !!data.isAdmin;
      if (data.mustChangePassword) {
        showPasswordChangeRequired(data.user);
      } else {
        await enterApp(data.user);
      }
    }
  } catch(e) {}
}

// ---- POLLING ----
function buildTimerOffsets() {
  const now = Date.now();
  const newOffsets = {};
  tickets.forEach(t => {
    if (t.running && !t.completed) {
      newOffsets[t.id] = { base: t.liveElapsed || 0, since: now };
    }
  });
  timerOffsets = newOffsets;
}

function localTick() {
  const now = Date.now();
  tickets.forEach(t => {
    if (!t.running || t.completed) return;
    const el = document.getElementById('timer-' + t.id);
    if (!el) return;
    const offset = timerOffsets[t.id];
    if (!offset) return;
    const elapsed = offset.base + (now - offset.since) / 1000;
    const newText = formatTime(elapsed);
    if (el.textContent !== newText) el.textContent = newText;
  });
}

function startPolling() {
  stopPolling();
  localTickInterval = setInterval(localTick, 1000);
  serverSyncInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/tickets');
      if (res.ok) {
        tickets = await res.json();
        buildTimerOffsets();
        renderTickets();
        localTick();
      }
    } catch(e) {}
  }, 5000);
}

function stopPolling() {
  if (localTickInterval) { clearInterval(localTickInterval); localTickInterval = null; }
  if (serverSyncInterval) { clearInterval(serverSyncInterval); serverSyncInterval = null; }
}

// ---- NAVIGATION ----
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  if (name === 'active') tabs[0].classList.add('active');
  else if (name === 'history') tabs[1].classList.add('active');
  else if (name === 'admin') document.getElementById('admin-nav-tab').classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'admin') loadAdminPage();
}

// ---- UTILS ----
function formatTime(seconds) {
  const s = Math.floor(seconds || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ---- TICKETS ----
async function loadTickets() {
  const res = await fetch('/api/tickets');
  if (!res.ok) return;
  tickets = await res.json();
  buildTimerOffsets();
  document.getElementById('active-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  renderTickets();
}

function renderCard(ticket, readonly) {
  const elapsed = ticket.liveElapsed || 0;
  const isRunning = ticket.running && !ticket.completed;
  const statusLabel = ticket.completed ? 'Completed' : (ticket.running ? 'Running' : 'Paused');
  const statusClass = ticket.completed ? 'status-completed' : (ticket.running ? 'status-running' : 'status-paused');
  const cardClass = (ticket.completed ? 'completed' : (ticket.running ? 'running' : '')) + (readonly ? ' readonly' : '');

  const mobileActions = (readonly || ticket.completed) ? '' : `
    <div class="card-actions mobile-only">
      ${isRunning
        ? `<button class="card-btn stop" onclick="stopTicket('${ticket.id}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            Pause
           </button>`
        : `<button class="card-btn play" onclick="startTicket('${ticket.id}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8V4z"/></svg>
            Resume
           </button>`
      }
      <button class="card-btn complete" onclick="completeTicket('${ticket.id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
        Done
      </button>
      <button class="card-btn delete" onclick="deleteTicket('${ticket.id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Delete
      </button>
    </div>`;

  const mobileDoneRow = (!readonly && ticket.completed) ? `
    <div class="card-done-row mobile-only">
      <span class="done-label">Total time</span>
      <span class="done-time">${formatTime(elapsed)}</span>
      <button class="btn-remove" onclick="deleteTicket('${ticket.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>` : '';

  const desktopActions = readonly
    ? (ticket.completed
        ? `<div class="completed-inline"><span class="completed-time-badge">${formatTime(elapsed)}</span></div>`
        : '')
    : (ticket.completed
        ? `<div class="completed-inline">
            <span class="completed-time-badge">${formatTime(elapsed)}</span>
            <button class="btn-icon delete" onclick="deleteTicket('${ticket.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>`
        : `<div class="card-inline-actions">
            ${isRunning
              ? `<button class="btn-icon stop" onclick="stopTicket('${ticket.id}')">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                 </button>`
              : `<button class="btn-icon play" onclick="startTicket('${ticket.id}')">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8V4z"/></svg>
                 </button>`
            }
            <button class="btn-icon complete" onclick="completeTicket('${ticket.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
            </button>
            <button class="btn-icon delete" onclick="deleteTicket('${ticket.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>`);

  return `<div class="ticket-card ${cardClass}">
    <div class="card-top">
      <div class="card-top-row1">
        <div class="ticket-info">
          <div class="ticket-number">${ticket.ticketNumber}</div>
          <div class="ticket-status ${statusClass}">${statusLabel}</div>
        </div>
        ${desktopActions}
      </div>
      <div class="ticket-timer ${isRunning ? 'running' : ''}" id="timer-${ticket.id}">${formatTime(elapsed)}</div>
    </div>
    ${mobileActions}
    ${mobileDoneRow}
  </div>`;
}

function renderSection(label, labelClass, items, readonly) {
  if (items.length === 0) return '';
  return `<div class="ticket-section">
    <div class="ticket-section-header">
      <span class="ticket-section-label ${labelClass}">${label}</span>
      <span class="ticket-section-count">${items.length}</span>
      <div class="ticket-section-line"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${items.map(t => renderCard(t, readonly)).join('')}
    </div>
  </div>`;
}

function renderTickets() {
  const list = document.getElementById('tickets-list');
  const running   = tickets.filter(t => !t.completed && t.running);
  const paused    = tickets.filter(t => !t.completed && !t.running);
  const completed = tickets.filter(t => t.completed);

  const totalElapsed = tickets.reduce((sum, t) => sum + (t.liveElapsed || 0), 0);
  document.getElementById('active-stats').innerHTML = `
    <div class="stat-chip"><div class="val">${running.length + paused.length}</div><div class="lbl">Active</div></div>
    <div class="stat-chip"><div class="val" style="color:var(--green)">${running.length}</div><div class="lbl">Running</div></div>
    <div class="stat-chip"><div class="val">${completed.length}</div><div class="lbl">Done Today</div></div>
    <div class="stat-chip"><div class="val" style="color:var(--blue-200)">${formatTime(totalElapsed)}</div><div class="lbl">Total</div></div>
  `;

  if (tickets.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
      <p>No tickets tracked yet</p>
      <small>Add a ticket number above to start tracking</small>
    </div>`;
    return;
  }

  list.innerHTML =
    renderSection('Running', 'label-running', running, false) +
    renderSection('Paused', 'label-paused', paused, false) +
    renderSection('Done Today', 'label-done', completed, false);
}

async function addTicket() {
  const input = document.getElementById('ticket-input');
  const errorEl = document.getElementById('input-error');
  const val = input.value.trim();
  errorEl.textContent = '';
  if (!val) { errorEl.textContent = 'Please enter a ticket number.'; return; }
  try {
    const res = await fetch('/api/tickets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketNumber: val })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    tickets.push(data);
    input.value = '';
    buildTimerOffsets();
    renderTickets();
    toast('Timer started for ' + data.ticketNumber, 'success');
  } catch (e) {
    errorEl.textContent = e.message;
  }
}

async function startTicket(id) {
  const res = await fetch(`/api/tickets/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'start' })
  });
  const updated = await res.json();
  tickets[tickets.findIndex(t => t.id === id)] = updated;
  buildTimerOffsets();
  renderTickets();
}

async function stopTicket(id) {
  const res = await fetch(`/api/tickets/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'stop' })
  });
  const updated = await res.json();
  tickets[tickets.findIndex(t => t.id === id)] = updated;
  renderTickets();
}

async function completeTicket(id) {
  const ticket = tickets.find(t => t.id === id);
  const res = await fetch(`/api/tickets/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'complete' })
  });
  const updated = await res.json();
  tickets[tickets.findIndex(t => t.id === id)] = updated;
  renderTickets();
  toast(ticket.ticketNumber + ' marked complete', 'info');
}

async function deleteTicket(id) {
  await fetch(`/api/tickets/${id}`, { method: 'DELETE' });
  tickets = tickets.filter(t => t.id !== id);
  renderTickets();
}

// ---- HISTORY ----
async function loadHistory() {
  const res = await fetch('/api/history');
  const history = await res.json();
  const sortVal = document.getElementById('sort-select').value;
  const list = document.getElementById('history-list');

  if (!history.length) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 8v4l3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p>No history yet</p>
      <small>Completed tickets appear here the following day</small>
    </div>`;
    return;
  }

  const grouped = {};
  history.forEach(t => {
    const day = new Date(t.completedAt).toDateString();
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(t);
  });

  let days = Object.keys(grouped);
  days.sort((a, b) => sortVal === 'newest' ? new Date(b) - new Date(a) : new Date(a) - new Date(b));

  list.innerHTML = days.map(day => {
    const dayTickets = grouped[day];
    const total = dayTickets.reduce((sum, t) => sum + (t.totalTime || t.elapsed || 0), 0);
    const d = new Date(day);
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const label = d.toDateString() === new Date().toDateString()
      ? 'Today'
      : d.toDateString() === yesterday.toDateString()
        ? 'Yesterday'
        : d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

    return `<div class="history-group">
      <div class="history-group-header">
        <span>${label}</span>
        <span class="history-group-total">${formatTime(total)}</span>
      </div>
      ${dayTickets.map(t => `
        <div class="history-row">
          <span class="history-ticket-num">${t.ticketNumber}</span>
          <span class="history-completed-at">${new Date(t.completedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="history-time">${formatTime(t.totalTime || t.elapsed || 0)}</span>
          <button class="btn-del-history" onclick="deleteHistory('${t.id}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>`).join('')}
    </div>`;
  }).join('');
}

async function deleteHistory(id) {
  await fetch(`/api/history/${id}`, { method: 'DELETE' });
  loadHistory();
}

async function loadAdminPage() {

      <td>

          <span class="user-dot" style="background:${u.isAdmin ? 'var(--purple)' : 'var(--text-muted)'}"></span>
          ${u.username}

      </td>
      <td>
        <span class="role-badge ${u.isAdmin ? 'admin' : 'member'}">${u.isAdmin ? 'Admin' : 'Member'}</span>

function populateWorkViewerSelect() {
  // Already handled in loadUsersList
}

async function createUser() {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const errEl = document.getElementById('add-user-error');
  errEl.textContent = '';

  try {
    const res = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
    await loadUsersList();
    toast(`User "${username}" created`, 'success');
  } catch(e) {
    errEl.textContent = e.message;
  }
}

async function deleteUser(username) {
  if (!confirm(`Remove user "${username}"? Their ticket data will be kept on disk.`)) return;
  try {
    const res = await fetch(`/api/admin/users/${username}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    await loadUsersList();
    toast(`User "${username}" removed`, 'info');
  } catch(e) {
    toast(e.message, 'error');
  }
}

let workViewerCurrentUser = null;

async function loadWorkView() {
  const username = document.getElementById('work-viewer-select').value;
  if (!username) { toast('Select a user first', 'error'); return; }

  workViewerCurrentUser = username;
  document.getElementById('work-viewer-username').textContent = username;

async function fetchWorkActive(username) {
  const res = await fetch(`/api/admin/tickets/${username}`);
  const tickets = await res.json();
  const pane = document.getElementById('wv-pane-active');

  if (tickets.length === 0) {
    pane.innerHTML = `<div class="empty-state" style="padding:32px 20px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8"/></svg>
      <p>No active tickets</p>
      <small>${username} has nothing in progress right now</small>

async function fetchWorkHistory(username) {
  const res = await fetch(`/api/admin/history/${username}`);
  const history = await res.json();
  const pane = document.getElementById('wv-pane-history');

  if (!history.length) {
    pane.innerHTML = `<div class="empty-state" style="padding:32px 20px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p>No history yet</p>
      <small>${username} has no completed tickets on record</small>
    </div>`;
    return;
  }

  const grouped = {};
  history.forEach(t => {
    const day = new Date(t.completedAt).toDateString();
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(t);
  });

  const days = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

  pane.innerHTML = days.map(day => {
    const dayTickets = grouped[day];
    const total = dayTickets.reduce((sum, t) => sum + (t.totalTime || t.elapsed || 0), 0);
    const d = new Date(day);
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const label = d.toDateString() === new Date().toDateString()
      ? 'Today'
      : d.toDateString() === yesterday.toDateString()
        ? 'Yesterday'
        : d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

    return `<div class="history-group">
      <div class="history-group-header">
        <span>${label}</span>
        <span class="history-group-total">${formatTime(total)}</span>
      </div>
      ${dayTickets.map(t => `
        <div class="history-row">
          <span class="history-ticket-num">${t.ticketNumber}</span>
          <span class="history-completed-at">${new Date(t.completedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="history-time">${formatTime(t.totalTime || t.elapsed || 0)}</span>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function switchWorkTab(tab) {
  document.querySelectorAll('.work-viewer-tab').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'active') || (i === 1 && tab === 'history'));
  });
  document.querySelectorAll('.work-viewer-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`wv-pane-${tab}`).classList.add('active');

  if (tab === 'active' && workViewerCurrentUser) fetchWorkActive(workViewerCurrentUser);
  if (tab === 'history' && workViewerCurrentUser) fetchWorkHistory(workViewerCurrentUser);
}

// ---- TOAST ----
function toast(message, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
